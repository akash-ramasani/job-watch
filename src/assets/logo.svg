<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadow"/>
      <feFlood flood-color="#7C3AED" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="shadow" operator="in" result="colorShadow"/>
      <feMerge>
        <feMergeNode in="colorShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Subtle top-left highlight for depth -->
  <rect x="4" y="4" width="120" height="60" rx="26" ry="26" fill="white" opacity="0.06"/>

  <!-- J letter — bold, centered, white -->
  <!-- Stem: vertical bar -->
  <rect x="68" y="22" width="20" height="62" rx="6" ry="6" fill="white"/>
  <!-- Hook: bottom curve of J -->
  <path d="M 48 84 Q 48 108 68 108 Q 88 108 88 88" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>
  <!-- Serif-style top cap on stem -->
  <rect x="56" y="22" width="44" height="18" rx="6" ry="6" fill="white"/>
</svg>
